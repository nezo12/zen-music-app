name: Build Zen Music

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  windows:
    name: Windows EXE and installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: iscc installer/zen_music.iss

      - name: Upload Windows release folder
        uses: actions/upload-artifact@v4
        with:
          name: ZenMusic-Windows-Release
          path: build/windows/x64/runner/Release

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ZenMusicSetup
          path: dist/ZenMusicSetup.exe

  ios:
    name: Unsigned iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        shell: bash
        run: |
          rm -rf Payload ZenMusic-unsigned.ipa
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -qry ZenMusic-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ZenMusic-unsigned-ipa
          path: ZenMusic-unsigned.ipa
